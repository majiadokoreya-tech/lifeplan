<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>家計実績管理</title>
  <style>
    :root{
      --bg:#f5f6f8;--card:#fff;--text:#171717;--muted:#737373;--line:#e5e7eb;
      --main:#f97316;--main-dark:#ea580c;--main-soft:#fff7ed;--good:#16a34a;
      --bad:#dc2626;--blue:#2563eb;--shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.5}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app-header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .header-inner{width:min(100%,1100px);margin:auto;padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .app-title{margin:0;font-size:23px;font-weight:900}.app-sub{margin:2px 0 0;color:var(--muted);font-size:12px}
    .month-chip{border:0;border-radius:999px;padding:9px 12px;background:var(--main-soft);color:var(--main-dark);font-size:13px;font-weight:900}
    main{width:min(100%,1100px);margin:auto;padding:14px 14px 100px}
    .tabs{position:sticky;top:71px;z-index:30;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;padding:8px;background:rgba(245,246,248,.96);backdrop-filter:blur(10px);border-radius:16px}
    .tab{border:0;border-radius:12px;padding:10px 4px;background:#e5e7eb;color:#525252;font-size:12px;font-weight:900}
    .tab.active{background:var(--main);color:#fff;box-shadow:0 5px 12px rgba(249,115,22,.25)}
    .hidden{display:none!important}.card{margin-bottom:14px;padding:16px;background:var(--card);border:1px solid rgba(229,231,235,.9);border-radius:var(--radius);box-shadow:var(--shadow)}
    .title-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.title{margin:0;font-size:17px;font-weight:900}.small{color:var(--muted);font-size:12px}
    .month-nav{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.month-nav button{border:1px solid var(--line);border-radius:12px;padding:10px 13px;background:#fff;font-weight:900}
    input,select{width:100%;border:1px solid #d4d4d8;border-radius:12px;padding:11px;background:#fff;color:var(--text);font-size:16px}
    input:focus,select:focus{outline:3px solid rgba(249,115,22,.15);border-color:var(--main)}
    .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.sum{padding:13px;border:1px solid var(--line);border-radius:16px;background:#fafafa}.sum span{display:block;color:var(--muted);font-size:12px;font-weight:700}.sum strong{display:block;font-size:20px;font-weight:900;overflow-wrap:anywhere}
    .income{background:#eff6ff!important}.expense{background:#fef2f2!important}.balance{background:#f0fdf4!important}.positive{color:var(--good)}.negative{color:var(--bad)}
    .chart-layout{display:grid;grid-template-columns:minmax(0,280px) 1fr;gap:16px;align-items:center}.chart-wrap{position:relative;width:min(100%,280px);aspect-ratio:1;margin:auto}.chart-wrap canvas{width:100%;height:100%}.chart-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center;pointer-events:none}.chart-center span{font-size:12px;color:var(--muted);font-weight:800}.chart-center strong{font-size:19px;font-weight:900}
    .group-list,.input-groups,.manage-list{display:grid;gap:10px}.group-card{border:1px solid var(--line);border-radius:15px;overflow:hidden;background:#fff}.group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;background:#fafafa;font-weight:900}.group-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:7px}
    .detail-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:10px 12px;border-top:1px solid #f1f5f9;align-items:center}.detail-name{font-weight:800}.detail-meta{font-size:11px;color:var(--muted)}.detail-value{font-weight:900;text-align:right;white-space:nowrap}
    .input-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(120px,155px);gap:10px;padding:10px 12px;border-top:1px solid #f1f5f9;align-items:center}.money{position:relative}.money:before{content:"¥";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:900}.money input{padding-left:27px;text-align:right;font-weight:900}
    .btn-row{display:flex;gap:8px;margin-top:12px}.btn{width:100%;border:0;border-radius:13px;padding:12px;background:var(--main);color:#fff;font-size:14px;font-weight:900}.btn.secondary{background:#404040}.btn.danger{background:var(--bad)}.btn.outline{background:#fff;color:#404040;border:1px solid var(--line)}.btn.small-btn{width:auto;padding:7px 9px;font-size:12px}
    .field{margin-bottom:12px}.field label{display:block;margin-bottom:5px;color:var(--muted);font-size:12px;font-weight:800}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .manage-item{display:grid;grid-template-columns:42px 38px minmax(0,1fr) auto;gap:9px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff;transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease}.manage-item.dragging{opacity:.92;transform:scale(1.02);box-shadow:0 14px 32px rgba(15,23,42,.18);border-color:var(--main);z-index:50}.manage-item.drag-target{box-shadow:inset 0 3px 0 var(--main)}.drag-handle{width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--line);border-radius:12px;background:#f8fafc;color:#737373;font-size:22px;font-weight:900;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}.drag-handle:active{cursor:grabbing;background:var(--main-soft);color:var(--main-dark);border-color:#fdba74}.icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:18px}.manage-name{font-weight:900}.manage-meta{font-size:11px;color:var(--muted)}.actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
    .annual-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.annual{border-collapse:collapse;min-width:1550px;width:100%;font-size:12px;background:#fff}.annual th,.annual td{padding:8px;border-bottom:1px solid var(--line);border-right:1px solid #f1f5f9;text-align:right;white-space:nowrap}.annual th{position:sticky;top:0;background:#fafafa;z-index:2}.annual th:first-child,.annual td:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:1;min-width:125px}.annual th:nth-child(2),.annual td:nth-child(2){text-align:left;position:sticky;left:125px;background:#fff;z-index:1;min-width:130px}.annual tr.group-total td{font-weight:900;background:#fff7ed}.annual tr.income-total td{font-weight:900;background:#eff6ff}.annual tr.grand-total td{font-weight:900;background:#f0fdf4}
    .history-empty,.empty{padding:22px 12px;text-align:center;color:var(--muted);font-size:13px}.notice{padding:12px;border-radius:13px;background:var(--main-soft);color:#9a3412;font-size:12px;font-weight:700}
    @media(max-width:720px){.chart-layout{grid-template-columns:1fr}.chart-wrap{width:230px}.form-grid{grid-template-columns:1fr}}
    @media(max-width:520px){.tabs{top:68px}.tab{font-size:11px;padding:9px 2px}.input-row{grid-template-columns:1fr}.summary strong{font-size:18px}.manage-item{grid-template-columns:42px 36px minmax(0,1fr)}.manage-item .actions{grid-column:1/-1;justify-content:flex-end}.actions{justify-content:flex-start}}
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div><h1 class="app-title">家計実績管理</h1><p class="app-sub">費目・詳細・分類で月次と年間を管理</p></div>
    <button id="monthChip" class="month-chip" type="button"></button>
  </div>
</header>
<main>
  <nav class="tabs">
    <button class="tab active" data-tab="home">ホーム</button>
    <button class="tab" data-tab="input">月次入力</button>
    <button class="tab" data-tab="annual">年間</button>
    <button class="tab" data-tab="settings">項目設定</button>
  </nav>

  <section id="home" class="page">
    <div class="card">
      <div class="title-row"><h2 class="title">表示月</h2><span class="small">月単位</span></div>
      <div class="month-nav"><button id="homePrev">‹</button><input id="homeMonth" type="month"><button id="homeNext">›</button></div>
    </div>
    <div class="card">
      <div class="title-row"><h2 class="title">月間サマリー</h2><button id="goInput" class="btn outline small-btn">入力・編集</button></div>
      <div class="summary">
        <div class="sum income"><span>収入</span><strong id="sumIncome">0円</strong></div>
        <div class="sum expense"><span>支出</span><strong id="sumExpense">0円</strong></div>
        <div class="sum balance"><span>収支</span><strong id="sumBalance">0円</strong></div>
        <div class="sum"><span>貯蓄率</span><strong id="sumRate">0%</strong></div>
      </div>
    </div>
    <div class="card">
      <div class="title-row"><h2 class="title">支出内訳</h2><span id="groupCount" class="small"></span></div>
      <div class="chart-layout">
        <div class="chart-wrap"><canvas id="chart" width="320" height="320"></canvas><div class="chart-center"><span>支出合計</span><strong id="chartTotal">0円</strong></div></div>
        <div id="homeGroups" class="group-list"></div>
      </div>
    </div>
  </section>

  <section id="input" class="page hidden">
    <div class="card">
      <div class="title-row"><h2 class="title">入力月</h2><span class="small">1か月分をまとめて入力</span></div>
      <div class="month-nav"><button id="inputPrev">‹</button><input id="inputMonth" type="month"><button id="inputNext">›</button></div>
    </div>
    <div class="card">
      <div class="title-row"><h2 class="title">月次実績</h2><span class="small">マネーフォワードの集計額</span></div>
      <div id="inputGroups" class="input-groups"></div>
      <div class="btn-row"><button id="saveMonth" class="btn">この月を保存</button></div>
      <div class="btn-row"><button id="clearMonth" class="btn danger">この月を削除</button></div>
    </div>
    <div class="notice">項目の追加・編集・削除・並び替えは「項目設定」からできます。</div>
  </section>

  <section id="annual" class="page hidden">
    <div class="card">
      <div class="title-row"><h2 class="title">年間実績</h2><span class="small">12か月・平均・年間合計</span></div>
      <div class="month-nav"><button id="yearPrev">‹</button><input id="annualYear" type="number" min="2000" max="2100"><button id="yearNext">›</button></div>
    </div>
    <div class="card"><div id="annualTable"></div></div>
  </section>

  <section id="settings" class="page hidden">
    <div class="card">
      <div class="title-row"><h2 class="title">項目を追加・編集</h2><span class="small">費目＋詳細＋分類</span></div>
      <input id="editId" type="hidden">
      <div class="form-grid">
        <div class="field"><label>種類</label><select id="newType"><option value="expense">支出</option><option value="income">収入</option><option value="investment">投資</option></select></div>
        <div class="field"><label>費目</label><input id="newGroup" placeholder="例：食費"></div>
        <div class="field"><label>詳細</label><input id="newDetail" placeholder="例：外食"></div>
        <div class="field"><label>分類</label><select id="newClass"><option>毎月・固定</option><option>毎月・変動</option><option>不定・固定</option><option>不定・変動</option><option>収入・予算内</option><option>収入・予算外</option><option>投資</option></select></div>
        <div class="field"><label>アイコン</label><input id="newIcon" value="●" maxlength="4"></div>
        <div class="field"><label>色</label><input id="newColor" type="color" value="#64748b"></div>
      </div>
      <div class="btn-row"><button id="saveItem" class="btn">項目を追加</button><button id="cancelEdit" class="btn outline hidden">編集を取消</button></div>
    </div>
    <div class="card">
      <div class="title-row"><h2 class="title">項目一覧</h2><span id="itemCount" class="small"></span></div>
      <div class="notice" style="margin-bottom:10px;">左の「≡」を約0.2秒押してから上下へ動かしてください。大きく動かした場合はすぐ移動を開始します。指を離すと自動保存されます。</div>
      <div id="manageList" class="manage-list"></div>
    </div>
    <div class="card">
      <div class="title-row"><h2 class="title">データ管理</h2><span class="small">バックアップ推奨</span></div>
      <div class="btn-row"><button id="exportBtn" class="btn secondary">バックアップ保存</button><button id="importBtn" class="btn outline">復元</button></div>
      <input id="importFile" class="hidden" type="file" accept="application/json">
      <div class="btn-row"><button id="resetBtn" class="btn danger">すべて初期化</button></div>
    </div>
  </section>
</main>

<script>
"use strict";
const KEY="household_detail_v3";
const GROUP_COLORS={"収入":"#2563eb","住宅":"#34a77b","食費":"#ef4444","水道光熱費":"#eab308","教養・教育":"#6b82c4","自動車":"#52525b","日用品":"#86c995","保険":"#0f766e","通信費":"#9333ea","衣服・美容":"#f8b84e","健康・医療":"#ec4899","交通費":"#64748b","趣味・娯楽":"#db3f82","交際費":"#f97316","その他":"#a8a29e","株式投資":"#16a34a"};
const DEFAULT_ITEMS=[
["income_papa","income","収入","パパ","収入・予算内","💰","#2563eb"],
["income_overtime","income","残業","パパ","収入・予算内","💰","#0ea5e9"],
["income_mama","income","収入","ママ","収入・予算内","💰","#3b82f6"],
["income_side","income","副業","","収入・予算外","💰","#64748b"],
["income_temp","income","臨時収入","","収入・予算外","💰","#64748b"],
["income_bonus","income","賞与","ボーナス","収入・予算外","🎁","#0284c7"],
["housing_loan","expense","住宅","住宅ローン","毎月・固定","🏠","#34a77b"],
["food_grocery","expense","食費","食料品","毎月・変動","🍚","#ef4444"],
["food_eatout","expense","食費","外食","毎月・変動","🍽️","#ef4444"],
["food_long","expense","食費","長距離外食","毎月・変動","🍜","#ef4444"],
["utility_electric","expense","水道光熱費","電気代","毎月・固定","💡","#eab308"],
["utility_water","expense","水道光熱費","水道代","毎月・固定","🚰","#eab308"],
["edu_school","expense","教養・教育","学費","毎月・固定","📚","#6b82c4"],
["edu_swim","expense","教養・教育","スイミング","毎月・固定","🏊","#6b82c4"],
["car_gas","expense","自動車","ガソリン","毎月・変動","🚗","#52525b"],
["car_maint","expense","自動車","車検整備","不定・変動","🔧","#52525b"],
["car_toll","expense","自動車","高速代","毎月・変動","🛣️","#52525b"],
["daily_goods","expense","日用品","日用品費","毎月・変動","🧴","#86c995"],
["daily_drug","expense","日用品","ドラッグストア","毎月・変動","💊","#86c995"],
["insurance_1","expense","保険","生命保険1","毎月・固定","🛡️","#0f766e"],
["insurance_2","expense","保険","生命保険2","毎月・固定","🛡️","#0f766e"],
["comm_papa","expense","通信費","格安SIMパパ","毎月・固定","📱","#9333ea"],
["comm_mama","expense","通信費","格安SIMママ","毎月・固定","📱","#9333ea"],
["comm_net","expense","通信費","インターネット","毎月・固定","🛜","#9333ea"],
["comm_sub","expense","通信費","サブスク","毎月・変動","▶️","#9333ea"],
["beauty_hair","expense","衣服・美容","ヘアカット","毎月・変動","✂️","#f8b84e"],
["beauty_clothes","expense","衣服・美容","衣服","毎月・変動","👕","#f8b84e"],
["health_gym","expense","健康・医療","ジム","毎月・固定","🏋️","#ec4899"],
["health_hospital","expense","健康・医療","病院","不定・変動","🏥","#ec4899"],
["transport","expense","交通費","電車・バス・駐車場","毎月・変動","🚃","#64748b"],
["hobby_game","expense","趣味・娯楽","ゲーム・音楽","不定・変動","⭐","#db3f82"],
["social_drink","expense","交際費","飲み代","不定・変動","☕","#f97316"],
["other_unknown","expense","その他","不明","不定・変動","●","#a8a29e"],
["invest_ideco","investment","株式投資","iDeCo","投資","📈","#16a34a"],
["invest_nisa","investment","株式投資","NISA","投資","📈","#16a34a"],
["hobby_travel","expense","趣味・娯楽","旅行","不定・変動","✈️","#db3f82"],
["housing_tax","expense","住宅","固定資産税","不定・固定","🏠","#34a77b"],
["housing_fire","expense","住宅","火災地震保険","不定・固定","🏠","#34a77b"]
].map((x,i)=>({id:x[0],type:x[1],group:x[2],detail:x[3],classification:x[4],icon:x[5],color:x[6],order:i+1}));
const DEFAULT={items:DEFAULT_ITEMS,monthly:{},selectedMonth:currentMonth(),annualYear:new Date().getFullYear()};
let data=load();

function currentMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function clone(v){return JSON.parse(JSON.stringify(v))}
function yen(v){return Number(v||0).toLocaleString("ja-JP")+"円"}
function pct(v){return (Number.isFinite(v)?v:0).toFixed(1)+"%"}
function shiftMonth(key,n){const [y,m]=key.split("-").map(Number),d=new Date(y,m-1+n,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function id(){return "item_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function normalize(v){const n=Number(v);return Number.isFinite(n)&&n>=0?Math.round(n):0}
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw)return migrate(JSON.parse(raw));
    const old=localStorage.getItem("monthly_household_manager_v1");
    if(old){
      const o=JSON.parse(old),items=(o.categories||[]).map((c,i)=>({id:c.id,type:c.type==="income"?"income":"expense",group:c.name,detail:"",classification:c.type==="income"?"収入・予算内":"毎月・変動",icon:c.icon||"●",color:c.color||"#64748b",order:i+1}));
      return migrate({items,monthly:o.monthlyData||{},selectedMonth:o.selectedMonth||currentMonth(),annualYear:new Date().getFullYear()});
    }
  }catch(e){console.error(e)}
  return clone(DEFAULT);
}
function migrate(v){return {items:Array.isArray(v.items)&&v.items.length?v.items:clone(DEFAULT_ITEMS),monthly:v.monthly&&typeof v.monthly==="object"?v.monthly:{},selectedMonth:v.selectedMonth||currentMonth(),annualYear:Number(v.annualYear)||new Date().getFullYear()}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function sortedItems(){return [...data.items].sort((a,b)=>(a.order||0)-(b.order||0))}
function values(month){return data.monthly[month]||{}}
function amount(month,itemId){return normalize(values(month)[itemId]||0)}
function totals(month){
  let income=0,expense=0,investment=0;
  sortedItems().forEach(i=>{const a=amount(month,i.id);if(i.type==="income")income+=a;else if(i.type==="investment")investment+=a;else expense+=a});
  return {income,expense,investment,balance:income-expense-investment,rate:income?((income-expense-investment)/income)*100:0};
}
function grouped(typeFilter=null){
  const map=new Map();
  sortedItems().filter(i=>!typeFilter||i.type===typeFilter).forEach(i=>{if(!map.has(i.group))map.set(i.group,[]);map.get(i.group).push(i)});
  return map;
}
function setMonth(m){if(!m)return;data.selectedMonth=m;save();homeMonth.value=m;inputMonth.value=m;monthChip.textContent=m.replace("-","年")+"月";renderHome();renderInputs()}
function activate(tab){document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));document.querySelectorAll(".page").forEach(p=>p.classList.toggle("hidden",p.id!==tab));if(tab==="annual")renderAnnual();if(tab==="settings")renderSettings();window.scrollTo({top:0,behavior:"smooth"})}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>activate(b.dataset.tab));
homePrev.onclick=()=>setMonth(shiftMonth(data.selectedMonth,-1));homeNext.onclick=()=>setMonth(shiftMonth(data.selectedMonth,1));
inputPrev.onclick=()=>setMonth(shiftMonth(data.selectedMonth,-1));inputNext.onclick=()=>setMonth(shiftMonth(data.selectedMonth,1));
homeMonth.onchange=()=>setMonth(homeMonth.value);inputMonth.onchange=()=>setMonth(inputMonth.value);monthChip.onclick=()=>{setMonth(currentMonth());activate("home")};goInput.onclick=()=>activate("input");

function renderHome(){
  const t=totals(data.selectedMonth);
  sumIncome.textContent=yen(t.income);sumExpense.textContent=yen(t.expense+t.investment);sumBalance.textContent=yen(t.balance);sumRate.textContent=pct(t.rate);
  sumBalance.className=t.balance>=0?"positive":"negative";sumRate.className=t.rate>=0?"positive":"negative";chartTotal.textContent=yen(t.expense+t.investment);
  const map=new Map();
  sortedItems().filter(i=>i.type!=="income").forEach(i=>{const a=amount(data.selectedMonth,i.id);if(a>0)map.set(i.group,(map.get(i.group)||0)+a)});
  const entries=[...map.entries()].sort((a,b)=>b[1]-a[1]);groupCount.textContent=`${entries.length}費目`;
  if(!entries.length)homeGroups.innerHTML='<div class="empty">この月の支出データはありません。</div>';
  else homeGroups.innerHTML=entries.map(([g,a])=>`<div class="group-card"><div class="group-head"><span><i class="group-dot" style="background:${GROUP_COLORS[g]||"#64748b"}"></i>${esc(g)}</span><strong>${yen(a)}</strong></div>${sortedItems().filter(i=>i.group===g&&i.type!=="income"&&amount(data.selectedMonth,i.id)>0).map(i=>`<div class="detail-row"><div><div class="detail-name">${esc(i.detail||i.group)}</div><div class="detail-meta">${esc(i.classification)}</div></div><div class="detail-value">${yen(amount(data.selectedMonth,i.id))}</div></div>`).join("")}</div>`).join("");
  drawChart(entries);
}
function drawChart(entries){
  const c=chart,x=c.getContext("2d"),cx=160,cy=160,R=132,r=78,total=entries.reduce((s,e)=>s+e[1],0);x.clearRect(0,0,320,320);
  if(!total){x.beginPath();x.arc(cx,cy,R,0,Math.PI*2);x.arc(cx,cy,r,0,Math.PI*2,true);x.fillStyle="#e5e7eb";x.fill("evenodd");return}
  let start=-Math.PI/2;entries.forEach(([g,a])=>{const end=start+(a/total)*Math.PI*2;x.beginPath();x.arc(cx,cy,R,start,end);x.arc(cx,cy,r,end,start,true);x.closePath();x.fillStyle=GROUP_COLORS[g]||"#64748b";x.fill();x.strokeStyle="#fff";x.lineWidth=3;x.stroke();start=end})
}
function renderInputs(){
  const map=grouped(),v=values(data.selectedMonth);
  inputGroups.innerHTML=[...map.entries()].map(([g,items])=>`<div class="group-card"><div class="group-head"><span>${esc(g)}</span><span class="small">${items[0].type==="income"?"収入":items[0].type==="investment"?"投資":"支出"}</span></div>${items.map(i=>`<div class="input-row"><div><div class="detail-name">${esc(i.detail||i.group)}</div><div class="detail-meta">${esc(i.classification)}</div></div><div class="money"><input type="number" min="0" step="1" inputmode="numeric" data-id="${esc(i.id)}" value="${normalize(v[i.id]||0)||""}" placeholder="0"></div></div>`).join("")}</div>`).join("");
}
saveMonth.onclick=()=>{const out={};document.querySelectorAll("[data-id]").forEach(el=>out[el.dataset.id]=normalize(el.value));data.monthly[data.selectedMonth]=out;save();renderHome();alert("保存しました")};
clearMonth.onclick=()=>{if(confirm("この月の入力をすべて削除しますか？")){delete data.monthly[data.selectedMonth];save();renderInputs();renderHome()}};

yearPrev.onclick=()=>{data.annualYear--;annualYear.value=data.annualYear;save();renderAnnual()};yearNext.onclick=()=>{data.annualYear++;annualYear.value=data.annualYear;save();renderAnnual()};annualYear.onchange=()=>{data.annualYear=Number(annualYear.value)||new Date().getFullYear();save();renderAnnual()};
function renderAnnual(){
  const year=data.annualYear,months=Array.from({length:12},(_,i)=>`${year}-${String(i+1).padStart(2,"0")}`),items=sortedItems();
  const rows=[];let current="";
  items.forEach(i=>{
    if(i.group!==current){current=i.group}
    const vals=months.map(m=>amount(m,i.id)),sum=vals.reduce((a,b)=>a+b,0),avg=Math.round(sum/12);
    rows.push(`<tr><td>${esc(i.group)}</td><td>${esc(i.detail||"")}</td>${vals.map(v=>`<td>${v?yen(v):""}</td>`).join("")}<td>${yen(avg)}</td><td>${yen(sum)}</td></tr>`);
  });
  const incomeMonths=months.map(m=>totals(m).income),expenseMonths=months.map(m=>totals(m).expense+totals(m).investment),balanceMonths=months.map(m=>totals(m).balance);
  const totalRow=(label,arr,cls)=>`<tr class="${cls}"><td>${label}</td><td></td>${arr.map(v=>`<td>${yen(v)}</td>`).join("")}<td>${yen(Math.round(arr.reduce((a,b)=>a+b,0)/12))}</td><td>${yen(arr.reduce((a,b)=>a+b,0))}</td></tr>`;
  annualTable.innerHTML=`<div class="annual-wrap"><table class="annual"><thead><tr><th>費目</th><th>詳細</th>${months.map((_,i)=>`<th>${i+1}月</th>`).join("")}<th>平均</th><th>年間合計</th></tr></thead><tbody>${totalRow("収入合計",incomeMonths,"income-total")}${totalRow("支出・投資合計",expenseMonths,"group-total")}${totalRow("収支",balanceMonths,"grand-total")}${rows.join("")}</tbody></table></div>`;
}
function resetForm(){editId.value="";newType.value="expense";newGroup.value="";newDetail.value="";newClass.value="毎月・変動";newIcon.value="●";newColor.value="#64748b";saveItem.textContent="項目を追加";cancelEdit.classList.add("hidden")}
saveItem.onclick=()=>{
  const group=newGroup.value.trim(),detail=newDetail.value.trim();if(!group){alert("費目を入力してください");return}
  if(editId.value){const i=data.items.find(x=>x.id===editId.value);Object.assign(i,{type:newType.value,group,detail,classification:newClass.value,icon:newIcon.value||"●",color:newColor.value})}
  else data.items.push({id:id(),type:newType.value,group,detail,classification:newClass.value,icon:newIcon.value||"●",color:newColor.value,order:data.items.length+1});
  save();resetForm();renderSettings();renderInputs();renderHome();
};
cancelEdit.onclick=resetForm;
function renderSettings(){
  const items=sortedItems();itemCount.textContent=`${items.length}項目`;
  manageList.innerHTML=items.map(i=>`<div class="manage-item" data-sort-item="${esc(i.id)}"><div class="drag-handle" data-drag-handle="${esc(i.id)}" title="長押しして移動" aria-label="長押しして並び替え">≡</div><div class="icon" style="background:${esc(i.color)}">${esc(i.icon)}</div><div><div class="manage-name">${esc(i.group)}${i.detail?` / ${esc(i.detail)}`:""}</div><div class="manage-meta">${i.type==="income"?"収入":i.type==="investment"?"投資":"支出"}・${esc(i.classification)}</div></div><div class="actions"><button class="btn outline small-btn" data-edit="${esc(i.id)}">編集</button><button class="btn danger small-btn" data-del="${esc(i.id)}">削除</button></div></div>`).join("");
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>editItem(b.dataset.edit));
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delItem(b.dataset.del));
  setupDragSorting();
}
function setupDragSorting(){
  const container=manageList;
  let dragged=null;
  let activeHandle=null;
  let pointerId=null;
  let holdTimer=null;
  let dragging=false;
  let startX=0;
  let startY=0;

  const clearTimer=()=>{
    if(holdTimer){
      clearTimeout(holdTimer);
      holdTimer=null;
    }
  };

  const beginDrag=()=>{
    if(!dragged||dragging)return;
    dragging=true;
    dragged.classList.add("dragging");
    document.body.style.userSelect="none";
    document.body.style.webkitUserSelect="none";
    document.body.style.overflowX="hidden";
    if(navigator.vibrate)navigator.vibrate(25);
  };

  const saveCurrentOrder=()=>{
    const ids=[...container.querySelectorAll("[data-sort-item]")].map(el=>el.dataset.sortItem);
    ids.forEach((itemId,index)=>{
      const item=data.items.find(entry=>entry.id===itemId);
      if(item)item.order=index+1;
    });
    save();
    renderInputs();
    renderHome();
    renderAnnual();
  };

  const finishDrag=()=>{
    clearTimer();

    document.querySelectorAll(".manage-item").forEach(item=>{
      item.classList.remove("dragging","drag-target");
    });

    if(dragging){
      saveCurrentOrder();
      if(navigator.vibrate)navigator.vibrate(15);
    }

    if(activeHandle&&pointerId!==null){
      try{
        if(activeHandle.hasPointerCapture?.(pointerId)){
          activeHandle.releasePointerCapture(pointerId);
        }
      }catch(error){
        console.debug(error);
      }
    }

    dragged=null;
    activeHandle=null;
    pointerId=null;
    dragging=false;
    document.body.style.userSelect="";
    document.body.style.webkitUserSelect="";
    document.body.style.overflowX="";
  };

  container.querySelectorAll("[data-drag-handle]").forEach(handle=>{
    const item=handle.closest("[data-sort-item]");

    handle.addEventListener("pointerdown",event=>{
      if(event.pointerType==="mouse"&&event.button!==0)return;

      event.preventDefault();
      clearTimer();

      dragged=item;
      activeHandle=handle;
      pointerId=event.pointerId;
      startX=event.clientX;
      startY=event.clientY;

      try{
        handle.setPointerCapture(pointerId);
      }catch(error){
        console.debug(error);
      }

      holdTimer=setTimeout(beginDrag,180);
    });

    handle.addEventListener("pointermove",event=>{
      if(event.pointerId!==pointerId||!dragged)return;

      event.preventDefault();

      if(!dragging){
        const moved=Math.hypot(event.clientX-startX,event.clientY-startY);

        // 指の自然なブレは許容する。大きく動かした場合は即ドラッグ開始。
        if(moved>18){
          clearTimer();
          beginDrag();
        }

        return;
      }

      const target=document
        .elementFromPoint(event.clientX,event.clientY)
        ?.closest("[data-sort-item]");

      document.querySelectorAll(".manage-item").forEach(el=>{
        el.classList.remove("drag-target");
      });

      if(!target||target===dragged||!container.contains(target))return;

      target.classList.add("drag-target");
      const rect=target.getBoundingClientRect();
      const after=event.clientY>rect.top+rect.height/2;

      if(after){
        target.after(dragged);
      }else{
        target.before(dragged);
      }

      const edge=90;
      if(event.clientY<edge){
        window.scrollBy(0,-18);
      }else if(event.clientY>window.innerHeight-edge){
        window.scrollBy(0,18);
      }
    });

    handle.addEventListener("pointerup",event=>{
      if(event.pointerId===pointerId)finishDrag();
    });

    handle.addEventListener("pointercancel",finishDrag);

    handle.addEventListener("contextmenu",event=>{
      event.preventDefault();
    });
  });
}
function editItem(itemId){const i=data.items.find(x=>x.id===itemId);editId.value=i.id;newType.value=i.type;newGroup.value=i.group;newDetail.value=i.detail||"";newClass.value=i.classification;newIcon.value=i.icon||"●";newColor.value=i.color||"#64748b";saveItem.textContent="変更を保存";cancelEdit.classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}
function delItem(itemId){const i=data.items.find(x=>x.id===itemId);if(!confirm(`「${i.group} / ${i.detail||""}」を削除しますか？\n過去の金額も削除されます。`))return;data.items=data.items.filter(x=>x.id!==itemId);Object.values(data.monthly).forEach(v=>delete v[itemId]);data.items.forEach((x,n)=>x.order=n+1);save();renderSettings();renderInputs();renderHome();renderAnnual()}
exportBtn.onclick=()=>{const blob=new Blob([JSON.stringify({app:"household_detail",version:3,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`家計実績バックアップ_${currentMonth()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};
importBtn.onclick=()=>importFile.click();importFile.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result),d=p.data||p;if(!Array.isArray(d.items)||!d.monthly)throw 0;if(confirm("現在のデータを復元内容で置き換えますか？")){data=migrate(d);save();initRender();alert("復元しました")}}catch{alert("復元に失敗しました")}e.target.value=""};r.readAsText(f)};
resetBtn.onclick=()=>{if(confirm("すべてのデータを初期化しますか？")&&confirm("元に戻せません。本当に実行しますか？")){data=clone(DEFAULT);save();resetForm();initRender();activate("home")}};

function initRender(){homeMonth.value=data.selectedMonth;inputMonth.value=data.selectedMonth;annualYear.value=data.annualYear;monthChip.textContent=data.selectedMonth.replace("-","年")+"月";renderHome();renderInputs();renderAnnual();renderSettings()}
initRender();
</script>
