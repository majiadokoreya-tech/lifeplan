<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>家計・ライフプラン管理アプリ</title>
<style>
  :root { --bg:#f6f7fb; --card:#fff; --main:#2563eb; --text:#111827; --muted:#6b7280; --bad:#dc2626; --good:#16a34a; --warn:#f59e0b; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
  header{background:linear-gradient(135deg,#2563eb,#0f766e);color:#fff;padding:18px 16px 22px;border-radius:0 0 22px 22px}
  h1{font-size:22px;margin:0 0 6px} .sub{font-size:13px;opacity:.9}
  main{padding:14px;max-width:920px;margin:auto}.grid{display:grid;gap:12px}.card{background:var(--card);border-radius:18px;padding:14px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
  h2{font-size:17px;margin:0 0 12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px} input,select,button{width:100%;font-size:16px;border-radius:12px;border:1px solid #d1d5db;padding:10px;background:#fff}
  button{border:0;background:var(--main);color:#fff;font-weight:700}.btn2{background:#374151}.btnBad{background:#dc2626}.pill{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;background:#eef2ff;color:#1d4ed8}
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#f9fafb;border-radius:14px;padding:12px}.box b{font-size:19px}.good{color:var(--good)}.bad{color:var(--bad)}.muted{color:var(--muted);font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px} th,td{padding:8px;border-bottom:1px solid #eee;text-align:left} th{color:var(--muted);font-weight:600}.right{text-align:right}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.tab{padding:10px 4px;border-radius:12px;background:#e5e7eb;color:#111;font-size:13px}.tab.active{background:var(--main);color:white}.hidden{display:none}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--main);width:0}.danger span{background:var(--bad)}.ok span{background:var(--good)}
  canvas{width:100%;height:220px;border:1px solid #eee;border-radius:14px;background:#fff}.small{font-size:12px;color:#6b7280}.actions{display:flex;gap:8px}.actions button{font-size:13px;padding:8px}
</style>
</head>
<body>
<header>
  <h1>家計・ライフプラン管理</h1>
  <div class="sub">支出・予算・積立・将来資産をまとめて管理</div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">ホーム</button>
    <button class="tab" onclick="showTab('input',this)">入力</button>
    <button class="tab" onclick="showTab('plan',this)">予算</button>
    <button class="tab" onclick="showTab('life',this)">ライフ</button>
  </div>

  <section id="home" class="grid">
    <div class="card">
      <h2>今月のまとめ <span class="pill" id="monthLabel"></span></h2>
      <div class="summary">
        <div class="box">収入<br><b id="sumIncome">0円</b></div>
        <div class="box">支出<br><b id="sumExpense" class="bad">0円</b></div>
        <div class="box">残り<br><b id="sumBalance">0円</b></div>
        <div class="box">貯金率<br><b id="saveRate">0%</b></div>
      </div>
    </div>
    <div class="card">
      <h2>カテゴリー別支出</h2>
      <div id="categoryBars"></div>
    </div>
    <div class="card">
      <h2>履歴</h2>
      <table><thead><tr><th>日付</th><th>分類</th><th>内容</th><th class="right">金額</th></tr></thead><tbody id="history"></tbody></table>
    </div>
  </section>

  <section id="input" class="grid hidden">
    <div class="card">
      <h2>収入・支出を入力</h2>
      <div class="row">
        <div><label>日付</label><input type="date" id="date"></div>
        <div><label>種類</label><select id="type"><option value="expense">支出</option><option value="income">収入</option></select></div>
      </div><br>
      <div class="row">
        <div><label>カテゴリー</label><select id="category"></select></div>
        <div><label>金額</label><input type="number" id="amount" placeholder="例 3500"></div>
      </div><br>
      <label>メモ</label><input id="memo" placeholder="例 スーパー、ガソリン、給料など"><br><br>
      <button onclick="addRecord()">追加する</button>
    </div>
    <div class="card">
      <h2>データ管理</h2>
      <div class="row">
        <button class="btn2" onclick="exportData()">バックアップ</button>
        <button class="btnBad" onclick="clearAll()">全削除</button>
      </div>
      <p class="small">データはこのスマホ/ブラウザ内に保存されます。</p>
    </div>
  </section>

  <section id="plan" class="grid hidden">
    <div class="card">
      <h2>月の予算設定</h2>
      <div id="budgetInputs"></div><br>
      <button onclick="saveBudgets()">予算を保存</button>
    </div>
    <div class="card">
      <h2>予算との差</h2>
      <div id="budgetResult"></div>
    </div>
  </section>

  <section id="life" class="grid hidden">
    <div class="card">
      <h2>ライフプラン簡易シミュレーション</h2>
      <div class="row">
        <div><label>現在の貯金・投資</label><input type="number" id="asset" value="3300000"></div>
        <div><label>毎月の積立</label><input type="number" id="monthlySave" value="50000"></div>
      </div><br>
      <div class="row">
        <div><label>年間特別支出</label><input type="number" id="yearExpense" value="600000"></div>
        <div><label>年利（%）</label><input type="number" id="rate" value="3"></div>
      </div><br>
      <button onclick="drawLifePlan()">10年シミュレーション</button>
      <br><br><canvas id="chart" width="800" height="300"></canvas>
      <p class="small">※ざっくり計算です。教育費・車買替・住宅ローンなどは次版で細かく入れられるようにできます。</p>
    </div>
  </section>
</main>
<script>
const cats = ['食費','日用品','住宅ローン','水道光熱','通信','保険','車','教育','外食','旅行/帰省','医療','その他'];
const incomeCats = ['給料','副業','ボーナス','その他収入'];
let records = JSON.parse(localStorage.getItem('records')||'[]');
let budgets = JSON.parse(localStorage.getItem('budgets')||'{}');
const yen = n => (Number(n)||0).toLocaleString('ja-JP')+'円';
function today(){return new Date().toISOString().slice(0,10)}
document.getElementById('date').value=today();
function fillCats(){ const sel=document.getElementById('category'); const arr=document.getElementById('type').value==='income'?incomeCats:cats; sel.innerHTML=arr.map(c=>`<option>${c}</option>`).join(''); }
document.getElementById('type').addEventListener('change',fillCats); fillCats();
function showTab(id,btn){document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active'); render();}
function addRecord(){ const r={id:Date.now(),date:date.value||today(),type:type.value,category:category.value,amount:Number(amount.value),memo:memo.value}; if(!r.amount)return alert('金額を入れてください'); records.unshift(r); localStorage.setItem('records',JSON.stringify(records)); amount.value=''; memo.value=''; render(); alert('追加しました'); }
function thisMonthRecords(){const ym=today().slice(0,7); monthLabel.textContent=ym; return records.filter(r=>r.date.slice(0,7)===ym)}
function render(){ const ms=thisMonthRecords(); const inc=ms.filter(r=>r.type==='income').reduce((a,b)=>a+b.amount,0); const exp=ms.filter(r=>r.type==='expense').reduce((a,b)=>a+b.amount,0); sumIncome.textContent=yen(inc); sumExpense.textContent=yen(exp); sumBalance.textContent=yen(inc-exp); sumBalance.className=(inc-exp)>=0?'good':'bad'; saveRate.textContent=inc?Math.round((inc-exp)/inc*100)+'%':'0%'; renderHistory(ms); renderBars(ms); renderBudgetInputs(); renderBudgetResult(ms);}
function renderHistory(ms){history.innerHTML=ms.slice(0,30).map(r=>`<tr><td>${r.date}</td><td>${r.category}</td><td>${r.memo||''}</td><td class="right ${r.type==='expense'?'bad':'good'}">${r.type==='expense'?'-':'+'}${yen(r.amount)}</td></tr>`).join('') || '<tr><td colspan="4" class="muted">まだ記録がありません</td></tr>'}
function renderBars(ms){ const sums={}; cats.forEach(c=>sums[c]=0); ms.filter(r=>r.type==='expense').forEach(r=>sums[r.category]=(sums[r.category]||0)+r.amount); const max=Math.max(...Object.values(sums),1); categoryBars.innerHTML=cats.filter(c=>sums[c]>0).map(c=>`<div style="margin:10px 0"><div class="row"><span>${c}</span><b class="right">${yen(sums[c])}</b></div><div class="bar"><span style="width:${Math.min(100,sums[c]/max*100)}%"></span></div></div>`).join('')||'<p class="muted">支出を入力すると表示されます</p>'}
function renderBudgetInputs(){ budgetInputs.innerHTML=cats.map(c=>`<div class="row" style="margin-bottom:8px"><label>${c}</label><input type="number" data-cat="${c}" value="${budgets[c]||''}" placeholder="予算"></div>`).join('')}
function saveBudgets(){ document.querySelectorAll('[data-cat]').forEach(i=>budgets[i.dataset.cat]=Number(i.value)||0); localStorage.setItem('budgets',JSON.stringify(budgets)); render(); alert('保存しました');}
function renderBudgetResult(ms){ const spent={}; cats.forEach(c=>spent[c]=0); ms.filter(r=>r.type==='expense').forEach(r=>spent[r.category]=(spent[r.category]||0)+r.amount); budgetResult.innerHTML=cats.map(c=>{const b=budgets[c]||0;if(!b)return'';const p=Math.min(100,spent[c]/b*100);const cls=spent[c]>b?'danger':'ok';return `<div style="margin:12px 0"><div class="row"><span>${c}</span><b class="right">${yen(spent[c])} / ${yen(b)}</b></div><div class="bar ${cls}"><span style="width:${p}%"></span></div><div class="small">残り ${yen(b-spent[c])}</div></div>`}).join('')||'<p class="muted">予算を設定してください</p>'}
function drawLifePlan(){ const c=chart,ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); let a=Number(asset.value)||0, m=Number(monthlySave.value)||0, y=Number(yearExpense.value)||0, r=(Number(rate.value)||0)/100; const data=[]; for(let i=0;i<=10;i++){data.push(a); a=(a+m*12-y)*(1+r);} const max=Math.max(...data,1); ctx.beginPath(); data.forEach((v,i)=>{const x=40+i*(720/10), yy=260-(v/max*220); if(i===0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy); ctx.fillText(i+'年',x-8,285); ctx.fillText(Math.round(v/10000)+'万',x-12,yy-8);}); ctx.stroke(); ctx.fillText('10年後: '+yen(data[10]),40,25); }
function exportData(){ const blob=new Blob([JSON.stringify({records,budgets},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kakeibo-backup.json'; a.click(); }
function clearAll(){ if(confirm('本当に全データを削除しますか？')){localStorage.clear();records=[];budgets={};render();}}
render(); drawLifePlan();
</script>
</body>
</html>
